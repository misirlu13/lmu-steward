name: Publish

on:
  push:
    branches:
      - main

jobs:
  publish:
    # To enable auto publishing to github, update your electron publisher
    # config in package.json > "build" and remove the conditional below
    if: ${{ github.repository_owner == 'lmu-steward' }}

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest]

    steps:
      - name: Checkout git repo
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://github.com/$env:GITHUB_REPOSITORY.git"
          git -c http.extraheader="AUTHORIZATION: bearer $env:GITHUB_TOKEN" fetch --no-tags --prune --depth=1 origin $env:GITHUB_SHA
          git checkout --force --detach FETCH_HEAD

      - name: Install Node and NPM
        shell: pwsh
        run: |
          $nodeRoot = Join-Path $env:RUNNER_TOOL_CACHE "node"
          $versionDir = Get-ChildItem -Path $nodeRoot -Directory | Where-Object { $_.Name -like "22.*" } | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $versionDir) {
            throw "Node 22 was not found in RUNNER_TOOL_CACHE."
          }

          $archDir = Join-Path $versionDir.FullName "x64"
          $binDir = if ($IsWindows) { $archDir } else { Join-Path $archDir "bin" }

          $env:PATH = "$binDir$([IO.Path]::PathSeparator)$env:PATH"
          $binDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          node --version
          npm --version

      - name: Install and build
        run: |
          npm install
          npm run postinstall
          npm run build

      - name: Publish releases
        env:
          # The APPLE_* values are used for auto updates signing
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASS }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # This is used for uploading release assets to github
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm exec electron-builder -- --publish always --win
